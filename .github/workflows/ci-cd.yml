# GitHub Actions CI/CD Pipeline for AI Tetris
# 自动化测试、构建和部署

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  schedule:
    # 每周一凌晨 1 点运行一次完整测试 (UTC)
    - cron: '0 1 * * 1'
  workflow_dispatch:
    inputs:
      test_coverage:
        description: '启用覆盖率报告上传到 Codecov'
        required: false
        type: boolean
        default: true
      run_benchmark:
        description: '运行性能基准测试'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: docker.io
  IMAGE_NAME: nanfeng2021/ai-tetris

jobs:
  # ============================================
  # 1. 代码质量检查
  # ============================================
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.1.0 flake8 isort mypy pytest

      - name: Check formatting (Black)
        run: black --check --config pyproject.toml src/ tests/

      - name: Check imports (isort)
        run: isort --check-only --settings-path pyproject.toml src/ tests/

      - name: Lint (flake8)
        run: flake8 src/ tests/ --config .flake8 --count --show-source --statistics

      - name: Type checking (mypy)
        run: mypy src/ --ignore-missing-imports --no-error-summary

  # ============================================
  # 2. 单元测试 + 覆盖率
  # ============================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
        os: [ubuntu-latest]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            -v \
            --junitxml=junit/test-results.xml
      
      - name: Upload coverage to Codecov
        if: ${{ github.event.inputs.test_coverage != 'false' }}
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests-${{ matrix.python-version }}
          name: codecov-${{ matrix.python-version }}
          fail_ci_if_error: false
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit/test-results.xml
          retention-days: 7

  # ============================================
  # 3. Harness Engineering 专项测试
  # ============================================
  harness-validation:
    name: 🔒 Harness Validation
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage
      
      - name: Run Guardrail tests (100% coverage required)
        run: |
          coverage run -m pytest tests/test_guardrails.py -v
          coverage report --include="src/harness/guardrails.py" --fail-under=100
      
      - name: Run Validator tests (100% coverage required)
        run: |
          coverage run -m pytest tests/test_validators.py -v
          coverage report --include="src/harness/validators.py" --fail-under=100
      
      - name: Run Monitor tests
        run: pytest tests/test_monitors.py -v --tb=short

  # ============================================
  # 4. 前端测试 (JavaScript)
  # ============================================
  frontend-test:
    name: 🌐 Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd web
          if [ -f "package.json" ]; then
            npm install
          else
            echo "No package.json, skipping"
            exit 0
          fi
      
      - name: Run ESLint (if configured)
        run: |
          cd web
          if [ -f "package.json" ] && grep -q '"lint"' package.json; then
            npm run lint || true
          fi
      
      - name: Run frontend tests
        run: |
          cd web
          if [ -f "static/js/game.test.js" ]; then
            node static/js/game.test.js
          else
            echo "No test file found"
            exit 0
          fi
      
      - name: Validate JavaScript syntax
        run: |
          if [ -f "web/static/js/game_optimized.js" ]; then
            node --check web/static/js/game_optimized.js && echo "✅ JavaScript syntax OK"
          else
            echo "⚠️ File not found"
          fi

  # ============================================
  # 5. Docker 构建测试
  # ============================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [test, harness-validation, frontend-test]
    if: github.event_name == 'push'
    timeout-minutes: 30
    
    permissions:
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      
      - name: Build Docker image (test)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-tetris:test-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      
      - name: Test Docker image
        run: |
          docker run --rm ai-tetris:test-${{ github.sha }} python --version
      
      # Fix cache issue
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ============================================
  # 6. 部署到生产环境 (仅当 tag 推送时)
  # ============================================
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    
    environment:
      name: production
      url: https://hub.docker.com/r/nanfeng2021/ai-tetris
    
    permissions:
      packages: write
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-deploy
          key: ${{ runner.os }}-buildx-deploy-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-deploy-
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache-deploy
          cache-to: type=local,dest=/tmp/.buildx-cache-deploy-new,mode=max
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify deployment success
        run: |
          echo "✅ Deployed version ${{ github.ref_name }} successfully!"
          echo "📦 Docker image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "🔗 View on Docker Hub: https://hub.docker.com/r/nanfeng2021/ai-tetris"
      
      # Fix cache issue
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-deploy
          mv /tmp/.buildx-cache-deploy-new /tmp/.buildx-cache-deploy

  # ============================================
  # 7. 性能基准测试 (可选，手动触发)
  # ============================================
  performance-benchmark:
    name: ⚡ Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event.inputs.run_benchmark == 'true' || github.event_name == 'schedule'
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark
      
      - name: Run performance benchmarks
        run: pytest tests/ --benchmark-only --benchmark-json=benchmark.json
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json
          retention-days: 30

# ============================================
# Workflow 配置
# ============================================
permissions:
  contents: write
  packages: write
  pull-requests: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# GitHub Actions CI/CD Pipeline for AI Tetris
# 自动化测试、构建和部署

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    # 每周一早上 9 点运行一次完整测试
    - cron: '0 1 * * 1'

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: docker.io
  IMAGE_NAME: nanfeng2021/ai-tetris

jobs:
  # ============================================
  # 1. 代码质量检查
  # ============================================
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.1.0 flake8 isort mypy pytest

      - name: Check formatting (Black)
        run: black --check --config pyproject.toml src/ tests/

      - name: Check imports (isort)
        run: isort --check-only --settings-path pyproject.toml src/ tests/

      - name: Lint (flake8)
        run: flake8 src/ tests/ --max-line-length=100 --count --show-source --statistics

      - name: Type checking (mypy)
        run: mypy src/ --ignore-missing-imports --no-error-summary

  # ============================================
  # 2. 单元测试 + 覆盖率
  # ============================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            -v \
            --junitxml=junit/test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: junit/test-results.xml
          retention-days: 7

  # ============================================
  # 3. Harness Engineering 专项测试
  # ============================================
  harness-validation:
    name: 🔒 Harness Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Guardrail tests
        run: pytest tests/test_guardrails.py -v --tb=short

      - name: Run Validator tests
        run: pytest tests/test_validators.py -v --tb=short

      - name: Run Monitor tests
        run: pytest tests/test_monitors.py -v --tb=short

      - name: Verify Guardrail coverage (100% required)
        run: |
          coverage run -m pytest tests/test_guardrails.py
          coverage report --include="src/harness/guardrails.py" --fail-under=100

      - name: Verify Validator coverage (100% required)
        run: |
          coverage run -m pytest tests/test_validators.py
          coverage report --include="src/harness/validators.py" --fail-under=100

  # ============================================
  # 4. 前端测试 (JavaScript)
  # ============================================
  frontend-test:
    name: 🌐 Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd web
          npm install || echo "No package.json, skipping"

      - name: Run ESLint (if configured)
        run: |
          cd web
          npm run lint || echo "No lint script or ESLint not configured, skipping"
        continue-on-error: true

      - name: Run frontend tests
        run: |
          cd web
          node static/js/game.test.js
        continue-on-error: false

      - name: Validate JavaScript syntax
        run: |
          node --check web/static/js/game_optimized.js 2>/dev/null && echo "✅ JavaScript syntax OK" || echo "⚠️ File not found or syntax error"

  # ============================================
  # 5. Docker 构建测试
  # ============================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [test, harness-validation]
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-tetris:test-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm ai-tetris:test-${{ github.sha }} python --version

  # ============================================
  # 6. 部署到生产环境 (仅当 tag 推送时)
  # ============================================
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify deployment success
        run: |
          echo "✅ Deployed version ${{ github.ref_name }} successfully!"
          echo "📦 Docker image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"

  # ============================================
  # 7. 性能基准测试 (可选，手动触发)
  # ============================================
  performance-benchmark:
    name: ⚡ Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark

      - name: Run performance benchmarks
        run: pytest tests/ --benchmark-only --benchmark-json=benchmark.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json
          retention-days: 30

# ============================================
# Workflow 配置
# ============================================
permissions:
  contents: write
  packages: write
  pull-requests: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
